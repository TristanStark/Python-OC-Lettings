name: Build and Deploy

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/python-oc-lettings

jobs:
  containerization:
    name: Build and push Docker image
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Define image tag
        id: vars
        run: echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }}
            ${{ env.IMAGE_NAME }}:latest

  deploy-production:
    name: Deploy to production VPS
    runs-on: ubuntu-latest
    needs: containerization

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy container on VPS
        run: |
          ssh -i ~/.ssh/vps_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            set -e

            APP_DIR="/opt/python-oc-lettings"
            IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/python-oc-lettings:${{ needs.containerization.outputs.image_tag }}"

            mkdir -p "$APP_DIR"

            printf "%s\n" \
              "SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}" \
              "DEBUG=False" \
              "ALLOWED_HOSTS=${{ secrets.DJANGO_ALLOWED_HOSTS }}" \
              "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" \
              "SENTRY_ENVIRONMENT=production" \
              "SENTRY_TRACES_SAMPLE_RATE=0.0" \
              "SENTRY_RELEASE=${{ github.sha }}" \
              > "$APP_DIR/.env"
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
              -u "${{ secrets.DOCKERHUB_USERNAME }}" \
              --password-stdin

            docker pull "$IMAGE"

            docker stop python-oc-lettings || true
            docker rm python-oc-lettings || true

            docker run -d \
              --name python-oc-lettings \
              --restart unless-stopped \
              --env-file "$APP_DIR/.env" \
              -p 80:8000 \
              "$IMAGE"

            docker image prune -af
          EOF